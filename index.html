<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Login</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="container">
            <form id="loginForm" class="card" novalidate>
                <h1>Iniciar sesión</h1>

                <div class="field">
                    <label for="email">Correo</label>
                    <input type="email" id="email" name="email" placeholder="tú@ejemplo.com" required />
                    <small class="error" id="emailError"></small>
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" minlength="4" required />
                    <small class="error" id="passwordError"></small>
                </div>

                <button type="submit" class="btn">Entrar</button>

                <p class="hint">Usuario demo: <strong>demo@demo.com</strong> / <strong>demo</strong></p>

                <div id="message" role="status" aria-live="polite"></div>
            </form>
        </main>

        <script src="script.js"></script>
    </body>
</html>
